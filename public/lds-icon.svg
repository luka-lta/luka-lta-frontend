<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <title>Luka Dev Studio Icon</title>

  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="#0D0D0F"/>

  <!-- Top-left square (Electric Blue, solid) -->
  <rect x="16" y="16" width="40" height="40" rx="6" fill="#3D5CFF"/>

  <!-- Top-right square (Electric Blue, muted) -->
  <rect x="64" y="16" width="40" height="40" rx="6" fill="#3D5CFF" opacity="0.4"/>

  <!-- Bottom-left square (Electric Blue, muted) -->
  <rect x="16" y="64" width="40" height="40" rx="6" fill="#3D5CFF" opacity="0.4"/>

  <!-- Bottom-right square (Cyber Teal, accent) -->
  <rect x="64" y="64" width="40" height="40" rx="6" fill="#00D4AA"/>
</svg>
